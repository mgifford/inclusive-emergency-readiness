<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Emergency Sign Background - Red/Orange for emergency -->
  <rect width="100" height="100" rx="15" fill="#cc0000"/>
  
  <!-- Emergency Exit Sign (White Border) -->
  <rect x="12" y="25" width="76" height="50" rx="3" fill="#cc0000" stroke="#fff" stroke-width="3"/>
  
  <!-- Exit Arrow (simplified) -->
  <path d="M20 45 L35 50 L35 55 L50 55 L50 60 L60 50 L50 40 L50 45 L35 45 L35 50 Z" fill="#fff"/>
  
  <!-- International Symbol of Access (Wheelchair) -->
  <g fill="#fff" transform="translate(68, 50) scale(0.30)">
    <!-- Head -->
    <circle cx="0" cy="-55" r="12" />
    <!-- Body/Wheelchair -->
    <path d="M15-30h-35c-8 0-15 7-15 15v5c0 8 7 15 15 15h5v18c0 10 8 18 18 18h15c2 0 4-2 4-4s-2-4-4-4h-15c-6 0-10-4-10-10v-18h35c8 0 15-7 15-15v-5c0-8-7-15-15-15z" />
    <!-- Wheel -->
    <circle cx="-10" cy="15" r="30" fill="none" stroke="#fff" stroke-width="8"/>
  </g>
</svg>
