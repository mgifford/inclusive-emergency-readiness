<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background for icon -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Person with cane (left side) -->
  <g fill="#FF6600">
    <!-- Head -->
    <circle cx="55" cy="60" r="18"/>
    
    <!-- Body torso -->
    <line x1="55" y1="78" x2="55" y2="115" stroke="#FF6600" stroke-width="11" stroke-linecap="round"/>
    
    <!-- Arms -->
    <line x1="55" y1="92" x2="75" y2="102" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>
    <line x1="55" y1="92" x2="35" y2="102" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="55" y1="115" x2="68" y2="150" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>
    <line x1="55" y1="115" x2="42" y2="150" stroke="#FF6600" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Cane/walking stick -->
    <line x1="68" y1="150" x2="68" y2="175" stroke="#FF6600" stroke-width="7" stroke-linecap="round"/>
  </g>
  
  <!-- Emergency exit door with arrow (right side) -->
  <g>
    <!-- Circular door frame - orange -->
    <circle cx="145" cy="100" r="48" fill="none" stroke="#FF6600" stroke-width="14"/>
    
    <!-- Door interior rectangle - white -->
    <rect x="120" y="75" width="36" height="50" rx="3" fill="white"/>
    
    <!-- Exit arrow pointing right -->
    <path d="M130 100 L170 100 M162 90 L175 100 L162 110" stroke="#FF6600" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
