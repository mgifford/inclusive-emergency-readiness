<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F5F5"/>
  
  <!-- Person with cane (left side) -->
  <g fill="#FF6600">
    <!-- Head -->
    <circle cx="220" cy="220" r="45"/>
    
    <!-- Body torso -->
    <line x1="220" y1="265" x2="220" y2="360" stroke="#FF6600" stroke-width="28" stroke-linecap="round"/>
    
    <!-- Arms -->
    <line x1="220" y1="300" x2="270" y2="325" stroke="#FF6600" stroke-width="25" stroke-linecap="round"/>
    <line x1="220" y1="300" x2="170" y2="325" stroke="#FF6600" stroke-width="25" stroke-linecap="round"/>
    
    <!-- Legs -->
    <line x1="220" y1="360" x2="255" y2="450" stroke="#FF6600" stroke-width="25" stroke-linecap="round"/>
    <line x1="220" y1="360" x2="185" y2="450" stroke="#FF6600" stroke-width="25" stroke-linecap="round"/>
    
    <!-- Cane/walking stick -->
    <line x1="255" y1="450" x2="255" y2="510" stroke="#FF6600" stroke-width="18" stroke-linecap="round"/>
  </g>
  
  <!-- Emergency exit door with arrow -->
  <g>
    <!-- Circular door frame - orange -->
    <circle cx="450" cy="315" r="120" fill="none" stroke="#FF6600" stroke-width="35"/>
    
    <!-- Door interior rectangle - white -->
    <rect x="390" y="255" width="90" height="120" rx="8" fill="white"/>
    
    <!-- Exit arrow pointing right -->
    <path d="M410 315 L520 315 M500 290 L535 315 L500 340" stroke="#FF6600" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Text: INCLUSIVE EMERGENCY READINESS -->
  <text x="650" y="260" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#2C3E50" letter-spacing="2">INCLUSIVE</text>
  <text x="650" y="350" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#2C3E50" letter-spacing="2">EMERGENCY</text>
  <text x="650" y="440" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#2C3E50" letter-spacing="2">READINESS</text>
  
  <!-- Subtitle -->
  <text x="650" y="520" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#666666">Accessible Emergency Communication Guide</text>
</svg>
