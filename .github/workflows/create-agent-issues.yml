name: Create Agent Improvement Issues

# Purpose: Create 3 structured GitHub Issues for ways this project can benefit
# from GitHub Copilot Coding Agent techniques described at:
# https://accessibility.github.com/documentation/guide/getting-started-with-agents/
#
# Runs automatically on push to main, and can also be triggered manually.
# It will skip issues whose titles already exist to avoid duplicates.

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  create-issues:
    name: Create Agent Improvement Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create the three agent improvement issues
        uses: actions/github-script@v7
        with:
          script: |
            // Helper to strip leading indentation from template literals
            const dedent = (str) => {
              const lines = str.split('\n');
              const minIndent = lines
                .filter(l => l.trim().length > 0)
                .reduce((min, l) => Math.min(min, l.match(/^(\s*)/)[1].length), Infinity);
              return lines.map(l => l.slice(minIndent)).join('\n').trim();
            };

            // Ensure required labels exist before creating issues
            const requiredLabels = [
              { name: 'agent-task',     color: '6E40C9', description: 'This issue is structured for automated work by Copilot Coding Agent' },
              { name: 'accessibility',  color: '0052CC', description: 'Accessibility improvements (WCAG, ARIA, screen readers)' },
              { name: 'easy-read',      color: 'BFD4F2', description: 'Easy Read content for cognitive accessibility' },
              { name: 'plain-language', color: 'D4C5F9', description: 'Plain language rewrites (Flesch-Kincaid Grade ≤ 6)' },
            ];

            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
                console.log(`Label already exists: ${label.name}`);
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                  console.log(`Created label: ${label.name}`);
                } else {
                  throw err;
                }
              }
            }

            // Issue definitions (content previously in .github/proposed-issues/*.md)
            const issues = [
              {
                title: '🤖 Use Copilot Coding Agent to Generate Easy Read Companion Pages for Critical Framework Content',
                labels: ['agent-task', 'accessibility', 'easy-read', 'enhancement'],
                body: dedent(`
                  ## Summary

                  The \`AGENTS.md\` governance document already mandates Easy Read versions for all critical survival instructions (Evacuation, Medical, Shelter). However, none of the current framework pages have an Easy Read companion file. The [GitHub Copilot Coding Agent guide](https://accessibility.github.com/documentation/guide/getting-started-with-agents/) explains how to write issues that a coding agent can tackle independently — this is a perfect candidate.

                  ## Problem

                  The \`AGENTS.md\` Easy Read Protocol states:

                  > "For critical survival instructions (Evacuation, Medical, Shelter), the agent must prompt the creation of an 'Easy Read' version following the **One Idea Per Line** principle."

                  None of the following pages have Easy Read companion files:
                  - \`framework/rwa-framework.md\`
                  - \`framework/physical-digital.md\`
                  - \`framework/seniors-identity.md\`
                  - \`framework/multiple-disabilities.md\`
                  - \`crisis.md\`
                  - \`crisis-disabilities.md\`
                  - \`disabilities/\` pages

                  During an emergency, people under stress — and people with cognitive disabilities — need content written at the lowest readable level. Easy Read versions are not optional for life-safety content.

                  ## Proposed Solution

                  A Copilot Coding Agent should be assigned to systematically generate Easy Read companion pages. Based on the agent techniques in the [getting started with agents guide](https://accessibility.github.com/documentation/guide/getting-started-with-agents/), the AGENTS.md already provides clear enough rules for an agent to act on:

                  1. **One idea per line** — no compound sentences
                  2. **Grade 4 reading level** — Flesch-Kincaid ≤ 4.0
                  3. **Short sentences** — 8–12 words maximum
                  4. **Simple words only** — no jargon, no acronyms without explanation
                  5. **Action-first** — "Do this." before "Why this matters."
                  6. **Icon placeholders** — suggest emoji or Unicode symbols for key actions

                  ## Acceptance Criteria

                  - [ ] Each critical framework page has a companion \`*-easy-read.md\` file
                  - [ ] Easy Read files pass Flesch-Kincaid Grade ≤ 4.0 (verified by \`readability-check.yml\`)
                  - [ ] Easy Read files use the existing page \`layout: default\` frontmatter
                  - [ ] Easy Read files link back to the full version ("Read the full guide")
                  - [ ] Full framework pages link forward to their Easy Read version ("Easy Read version available")
                  - [ ] At minimum these pages are covered: \`crisis.md\`, \`crisis-disabilities.md\`, \`framework/multiple-disabilities.md\`, \`framework/seniors-identity.md\`

                  ## Why This Is Agent-Ready

                  This task has:
                  - ✅ **Clear, binary acceptance criteria** — each file either exists or doesn't; it either passes Grade 4 or doesn't
                  - ✅ **Repeatable pattern** — the same transformation applied to multiple files
                  - ✅ **Existing rules in AGENTS.md** — the agent already has the constraints encoded
                  - ✅ **Automated verification** — the \`readability-check.yml\` workflow can validate output
                  - ✅ **No external dependencies** — pure content transformation, no APIs or secrets needed

                  ## Resources

                  - [AGENTS.md Easy Read Protocol](../AGENTS.md#b-accessibility-wcag-22--can-asc-64)
                  - [LLM Prompts — Plain Language Converter](../framework/llm-prompts.md#prompt-6-plain-language-converter) (Prompt 6 is a ready-made agent instruction)
                  - [Getting Started with Agents](https://accessibility.github.com/documentation/guide/getting-started-with-agents/)
                  - ISO 24495-1 (Plain Language standard)
                `)
              },
              {
                title: '��️ Add `agent-task` Label and Agent-Friendly Issue Templates to Enable Copilot Coding Agent Contributions',
                labels: ['enhancement', 'documentation', 'good first issue'],
                body: dedent(`
                  ## Summary

                  The [GitHub accessibility guide on getting started with agents](https://accessibility.github.com/documentation/guide/getting-started-with-agents/) explains that AI coding agents work best when issues are structured with clear, unambiguous acceptance criteria and enough context to act independently. This repository already has an excellent \`AGENTS.md\` governance file, but it lacks the GitHub infrastructure to make work agent-assignable at scale: a dedicated label, issue templates designed for agent consumption, and documentation in \`CONTRIBUTING.md\`.

                  ## Problem

                  Currently, the project has no structured way to signal to the Copilot Coding Agent which issues are ready for automated work. Issues like the Alert Gap analysis (#36) and Text-to-Speech resources (#55) contain useful research but aren't structured as agent-executable tasks (no binary acceptance criteria, no explicit file paths, no output format specified).

                  This means:
                  - Agents cannot reliably determine what "done" looks like
                  - Human reviewers cannot tell which PRs were agent-generated vs. manually written
                  - Valuable agent capacity goes unused on low-complexity, high-repetition tasks (link fixes, readability rewrites, alt text generation, Easy Read drafts)

                  ## Proposed Solution

                  ### 1. Add \`agent-task\` Label

                  Create a repository label:
                  - **Name:** \`agent-task\`
                  - **Color:** \`#6E40C9\` (GitHub Copilot purple)
                  - **Description:** "This issue is structured for automated work by Copilot Coding Agent"

                  ### 2. Create Agent-Friendly Issue Template

                  Add \`.github/ISSUE_TEMPLATE/agent-task.yml\` with fields that enforce agent-readable structure:

                  \`\`\`yaml
                  name: Agent Task
                  description: A task structured for the Copilot Coding Agent
                  labels: ["agent-task"]
                  body:
                    - type: textarea
                      id: goal
                      attributes:
                        label: Goal
                        description: One sentence. What should exist or be different after this task?
                      validations:
                        required: true
                    - type: textarea
                      id: files
                      attributes:
                        label: Files to Create or Edit
                        description: Exact paths. e.g., \`framework/crisis-easy-read.md\`
                      validations:
                        required: true
                    - type: textarea
                      id: acceptance
                      attributes:
                        label: Acceptance Criteria
                        description: Binary checklist. Each item must be verifiable without human judgment.
                      validations:
                        required: true
                    - type: textarea
                      id: constraints
                      attributes:
                        label: Constraints
                        description: "AGENTS.md rules that apply: reading level, page weight, WCAG requirements"
                    - type: textarea
                      id: verification
                      attributes:
                        label: How to Verify
                        description: "Which workflow validates this? e.g., readability-check.yml, accessibility-test.yml"
                  \`\`\`

                  ### 3. Update \`CONTRIBUTING.md\`

                  Add a section "Working with the Copilot Coding Agent" that explains:
                  - How to find agent-ready issues (filter by \`agent-task\` label)
                  - How to write an issue that an agent can tackle
                  - How to review agent-generated PRs (what the agent can and cannot verify)
                  - How to assign an issue to the Copilot Coding Agent on GitHub

                  ### 4. Backfill Existing Issues

                  Apply the \`agent-task\` label to existing issues that are already structured with clear acceptance criteria (once the label exists).

                  ## Acceptance Criteria

                  - [ ] \`agent-task\` label exists in the repository
                  - [ ] \`.github/ISSUE_TEMPLATE/agent-task.yml\` is committed and appears in the issue creation UI
                  - [ ] \`CONTRIBUTING.md\` includes a "Working with Copilot Coding Agent" section
                  - [ ] The section references the agent guide at \`https://accessibility.github.com/documentation/guide/getting-started-with-agents/\`
                  - [ ] At least one existing issue is retroactively labeled \`agent-task\`

                  ## Why This Matters

                  The [agents guide](https://accessibility.github.com/documentation/guide/getting-started-with-agents/) emphasizes that **the quality of the issue determines the quality of agent output**. This repository has 15+ framework pages, 4 automated workflows, and growing content — all needing ongoing accessibility maintenance. An agent can handle repeatable tasks (readability fixes, link rot repairs, Easy Read drafts, alt text generation) at scale, freeing human contributors for work requiring lived experience and community judgment.

                  ## Resources

                  - [Getting Started with Agents](https://accessibility.github.com/documentation/guide/getting-started-with-agents/)
                  - [AGENTS.md — Community Contribution Values](../AGENTS.md#7-community-contribution-values)
                  - [GitHub Issue Templates documentation](https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests)
                  - [CONTRIBUTING.md](../CONTRIBUTING.md)
                `)
              },
              {
                title: '🔤 Close the Readability Loop: Copilot Coding Agent Auto-Fix for Content Exceeding Grade 6',
                labels: ['agent-task', 'accessibility', 'plain-language', 'enhancement'],
                body: dedent(`
                  ## Summary

                  The \`readability-check.yml\` workflow (the "Linter of Clarity") already detects content that exceeds the Grade 6 Flesch-Kincaid target, posts a warning to PRs, and saves a report artifact. But it stops there — it detects, warns, and moves on. Based on the [getting started with agents guide](https://accessibility.github.com/documentation/guide/getting-started-with-agents/), the Copilot Coding Agent can close this loop: when the linter flags violations, an agent should be able to generate plain language rewrites and open a follow-up PR.

                  ## Problem

                  The current workflow loop is incomplete:

                  \`\`\`
                  Contributor submits PR → Linter flags Grade 7+ content → PR comment warns → (nothing happens) → Content ships at Grade 7+
                  \`\`\`

                  The AGENTS.md Plain Language protocol states:

                  > "If the Flesch-Kincaid Grade Level exceeds 7.0, the agent must flag the text **and provide a 'Suggested Simplification'** using active voice and common vocabulary."

                  The linter flags. But no suggested simplification is generated. The \`Prompt 6: Plain Language Converter\` in \`framework/llm-prompts.md\` already defines exactly how to do this simplification — but it requires a human to manually invoke the LLM. The Copilot Coding Agent can automate this loop end-to-end.

                  ## Proposed Solution

                  ### Option A: Agent-Ready Issue Auto-Created by Linter (Recommended)

                  Enhance \`readability-check.yml\` so that when violations are detected on \`main\` (after merge), it automatically creates a GitHub Issue with:
                  - The exact files that exceed Grade 6
                  - The current grade level of each file
                  - A request for the Copilot Coding Agent to simplify specific sections
                  - The \`agent-task\` label so it's automatically picked up

                  This means: every time complex content ships, a structured, agent-ready issue is automatically generated. The agent can then open a fix PR without requiring human triage.

                  \`\`\`yaml
                  # Add to readability-check.yml under the push to main path:
                  - name: Create agent task for readability fixes
                    if: github.event_name == 'push' && steps.readability.outputs.has_issues == 'true'
                    uses: actions/github-script@v7
                    with:
                      script: |
                        const report = require('fs').readFileSync('.readability-results/report.md', 'utf8');
                        await github.rest.issues.create({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          title: '🔤 Plain Language Fix Needed: Content Exceeds Grade 6',
                          body: \`## Readability Violations Detected\\n\\n\${report}\\n\\n## Agent Task\\nPlease simplify the flagged sections using the Plain Language rules in [AGENTS.md](../AGENTS.md#c-plain-language-grade-6-standard) and the converter prompt in [framework/llm-prompts.md](../framework/llm-prompts.md#prompt-6-plain-language-converter).\\n\\n**Target:** Flesch-Kincaid Grade ≤ 6.0 for all modified sections.\\n**Verify with:** \\\`readability-check.yml\\\`\`,
                          labels: ['agent-task', 'plain-language', 'accessibility']
                        });
                  \`\`\`

                  ### Option B: Enhance AGENTS.md with Explicit Fix Protocol

                  Add a section to \`AGENTS.md\` that gives the coding agent a concrete algorithm:

                  \`\`\`markdown
                  ### D. Plain Language Auto-Fix Protocol

                  When \`readability-check.yml\` reports violations:
                  1. For each flagged file, identify sentences with Flesch-Kincaid Grade > 6.0
                  2. Apply these transformations:
                     - Split sentences longer than 15 words at natural conjunction points
                     - Replace Tier-3 vocabulary with Tier-1/2 equivalents (see word list below)
                     - Convert passive voice: "Alerts should be sent" → "Teams must send alerts"
                     - Break multi-idea paragraphs into single-idea paragraphs
                  3. Verify the rewrite achieves Grade ≤ 6.0 before committing
                  4. Open a PR with title "fix(readability): simplify [filename] to Grade 6"
                  5. Reference the original readability report artifact in the PR body
                  \`\`\`

                  ## Acceptance Criteria

                  - [ ] \`readability-check.yml\` creates a GitHub Issue (labeled \`agent-task\`) when violations are detected on pushes to \`main\`
                  - [ ] The auto-created issue includes the exact file names and grade levels
                  - [ ] The auto-created issue contains the plain language rules and links to the converter prompt in \`framework/llm-prompts.md\`
                  - [ ] \`AGENTS.md\` includes an explicit Plain Language Auto-Fix Protocol (Section D or equivalent)
                  - [ ] The workflow does NOT create duplicate issues (checks for existing open \`plain-language\` + \`agent-task\` issues first)

                  ## Why This Is a Unique Agent Opportunity

                  | Capability | Human | Copilot Coding Agent |
                  |---|---|---|
                  | Detect Grade 7+ content | ✅ (via workflow) | ✅ (via workflow) |
                  | Apply Plain Language rules mechanically | 🐢 Slow | ⚡ Fast |
                  | Verify output reading level | ✅ | ✅ (via workflow) |
                  | Requires community/lived experience judgment | ✅ | ❌ |

                  Plain language simplification of existing content is **exactly the kind of repeatable, rule-based task** that the agents guide recommends for automation. The rules are already encoded in \`AGENTS.md\`. The verification is already automated in \`readability-check.yml\`. Only the fix loop is missing.

                  ## Resources

                  - [Getting Started with Agents](https://accessibility.github.com/documentation/guide/getting-started-with-agents/)
                  - [AGENTS.md Plain Language Protocol](../AGENTS.md#c-plain-language-grade-6-standard)
                  - [LLM Prompts — Plain Language Converter](../framework/llm-prompts.md#prompt-6-plain-language-converter)
                  - [\`readability-check.yml\`](.github/workflows/readability-check.yml)
                  - [Flesch-Kincaid Grade Level — Wikipedia](https://en.wikipedia.org/wiki/Flesch%E2%80%93Kincaid_readability_tests)
                `)
              }
            ];

            // Check for existing open issues (to avoid duplicates)
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existingTitles = existingIssues.map(i => i.title);

            let created = 0;
            let skipped = 0;

            for (const issue of issues) {
              if (existingTitles.some(t => t === issue.title)) {
                console.log(`Skipping (already exists): ${issue.title}`);
                skipped++;
                continue;
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels
              });

              console.log(`Created: ${issue.title}`);
              created++;
            }

            core.summary.addHeading('Agent Improvement Issues', 2);
            core.summary.addRaw(`Created: ${created} | Skipped (already exist): ${skipped}`);
            core.summary.addSeparator();
            core.summary.addRaw('Issues are based on techniques from: https://accessibility.github.com/documentation/guide/getting-started-with-agents/');
            await core.summary.write();
