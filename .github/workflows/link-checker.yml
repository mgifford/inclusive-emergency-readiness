name: Link Rot Guard

# Purpose: Check for broken links (external, internal, and on deployed website)
# - External URLs in markdown files
# - Internal links between pages (validates paths exist)
# - All links on the deployed GitHub Pages site
# If external links fail, suggests Wayback Machine snapshots
# Runs on PRs, pushes to main, weekly schedule, and manual triggers

on:
  pull_request:
    paths:
      - '**.md'
      - '**.html'
      - '_config.yml'
      - '.github/workflows/link-checker.yml'
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '**.html'
      - '_config.yml'
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual triggers

jobs:
  check-markdown-links:
    name: Check Markdown Source Links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
      
      - name: Check all links in markdown
        id: link-check
        run: |
          # Find all markdown files
          find . -name "*.md" -type f > files.txt
          
          # Extract URLs from markdown files
          grep -oP '(?<=\()https?://[^\)]+(?=\))' $(cat files.txt) | sort -u > urls.txt || true
          
          # Check each URL
          mkdir -p .link-check-results
          
          while IFS= read -r url; do
            echo "Checking: $url"
            
            # Check if URL is accessible
            response=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            
            if [ "$response" -ge 400 ] || [ "$response" = "000" ]; then
              echo "FAILED: $url (Status: $response)" >> .link-check-results/failed-links.txt
              
              # Get Wayback Machine snapshot
              archive_url="https://web.archive.org/web/$url"
              echo "Archive: $archive_url" >> .link-check-results/failed-links.txt
            else
              echo "OK: $url (Status: $response)" >> .link-check-results/working-links.txt
            fi
          done < urls.txt
        continue-on-error: true
      
      - name: Create markdown source report
        id: create-markdown-report
        run: |
          if [ -f .link-check-results/failed-links.txt ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
            
            # Create detailed report
            cat > .link-check-results/markdown-report.md << 'EOF'
          ## Failed Links in Markdown Source Files
          
          The following links in markdown files are no longer accessible:
          
          EOF
            
            cat .link-check-results/failed-links.txt >> .link-check-results/markdown-report.md
            
            echo "" >> .link-check-results/markdown-report.md
            echo "### Recommended Actions" >> .link-check-results/markdown-report.md
            echo "" >> .link-check-results/markdown-report.md
            echo "1. Review each failed link" >> .link-check-results/markdown-report.md
            echo "2. Replace with Wayback Machine archive URL if appropriate" >> .link-check-results/markdown-report.md
            echo "3. Find alternative current sources" >> .link-check-results/markdown-report.md
            echo "4. Remove links that are no longer relevant" >> .link-check-results/markdown-report.md
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload markdown check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-link-check-results
          path: .link-check-results/
          retention-days: 30
  
  check-internal-links:
    name: Check Internal Links in Markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Ruby and Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Build Jekyll site
        run: |
          bundle install
          # Read baseurl from config, handling both quoted and unquoted values
          BASEURL=$(grep "^baseurl:" _config.yml | sed -E 's/^baseurl:\s*"?([^"#]*)"?.*/\1/' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          
          # Verify baseurl was extracted successfully
          if [ -z "$BASEURL" ]; then
            echo "Warning: Could not extract baseurl from _config.yml, using empty baseurl"
            BASEURL=""
          else
            echo "Using baseurl: $BASEURL"
          fi
          
          bundle exec jekyll build --baseurl="$BASEURL"
        continue-on-error: false
      
      - name: Check internal links in markdown
        id: internal-link-check
        run: |
          mkdir -p .internal-link-results
          
          echo "Checking for internal links in markdown files..."
          
          # Find all markdown links that look like internal paths
          # Pattern: [text](/path) or [text](/path.html) but NOT http:// or https://
          find . -name "*.md" -type f -not -path "./_site/*" -not -path "./vendor/*" > md_files.txt
          
          broken_links_found=false
          
          while IFS= read -r file; do
            # Extract internal links from markdown: [text](/path) format
            # This regex finds markdown links that start with / but are NOT http/https
            grep -oP '\[([^\]]+)\]\((/[^)]+)\)' "$file" 2>/dev/null | while IFS= read -r match; do
              # Extract just the path part
              path=$(echo "$match" | sed -E 's/.*\(([^)]+)\).*/\1/')
              
              # Skip if it contains liquid syntax - defensive check in case regex matched unexpectedly
              # This handles edge cases where markdown might contain malformed liquid template syntax
              if echo "$path" | grep -q "{{"; then
                continue
              fi
              
              # Convert the path to what it should be in _site
              # Remove leading slash and check if file exists in _site
              check_path="_site${path}"
              
              # Also check with index.html appended if path ends with /
              if [[ "$path" == *"/" ]]; then
                check_path_index="${check_path}index.html"
              else
                check_path_index="${check_path}.html"
              fi
              
              # Check if either path exists
              if [ ! -f "$check_path" ] && [ ! -f "$check_path_index" ] && [ ! -d "$check_path" ]; then
                echo "BROKEN: $file -> $path" >> .internal-link-results/broken-internal-links.txt
                echo "  Checked: $check_path (not found)" >> .internal-link-results/broken-internal-links.txt
                echo "  Also checked: $check_path_index (not found)" >> .internal-link-results/broken-internal-links.txt
                broken_links_found=true
              fi
            done
            
            # Also check for Liquid relative_url filter syntax: {{ '/path/' | relative_url }} or {{ "/path/" | relative_url }}
            # Extract paths from relative_url filter calls, supporting both single and double quotes
            grep -oP "\{\{\s*['\"][^'\"]+['\"]\s*\|\s*relative_url\s*\}\}" "$file" 2>/dev/null | while IFS= read -r match; do
              # Extract the path from {{ '/path/' | relative_url }} or {{ "/path/" | relative_url }} syntax
              path=$(echo "$match" | sed -E "s/.*['\"]([^'\"]+)['\"].*/\1/")
              
              # Convert the path to what it should be in _site
              check_path="_site${path}"
              
              # Also check with index.html appended if path ends with /
              if [[ "$path" == *"/" ]]; then
                check_path_index="${check_path}index.html"
              else
                check_path_index="${check_path}.html"
              fi
              
              # Check if either path exists
              if [ ! -f "$check_path" ] && [ ! -f "$check_path_index" ] && [ ! -d "$check_path" ]; then
                echo "BROKEN: $file -> $path (via relative_url)" >> .internal-link-results/broken-internal-links.txt
                echo "  Checked: $check_path (not found)" >> .internal-link-results/broken-internal-links.txt
                echo "  Also checked: $check_path_index (not found)" >> .internal-link-results/broken-internal-links.txt
                broken_links_found=true
              fi
            done
          done < md_files.txt
          
          if [ "$broken_links_found" = true ] && [ -f .internal-link-results/broken-internal-links.txt ]; then
            echo "has_broken_links=true" >> $GITHUB_OUTPUT
            echo "❌ Found broken internal links!"
            cat .internal-link-results/broken-internal-links.txt
          else
            echo "has_broken_links=false" >> $GITHUB_OUTPUT
            echo "✅ All internal links are valid!"
            echo "All internal markdown links are valid." > .internal-link-results/internal-links-ok.txt
          fi
        continue-on-error: true
      
      - name: Create internal link report
        if: always()
        run: |
          mkdir -p .internal-link-results
          
          cat > .internal-link-results/internal-report.md << 'EOF'
          ## Internal Links Check
          
          This check validates that all internal links in markdown files point to existing pages.
          
          EOF
          
          if [ -f .internal-link-results/broken-internal-links.txt ]; then
            echo "### ❌ Broken Internal Links Found" >> .internal-link-results/internal-report.md
            echo "" >> .internal-link-results/internal-report.md
            echo '```' >> .internal-link-results/internal-report.md
            cat .internal-link-results/broken-internal-links.txt >> .internal-link-results/internal-report.md
            echo '```' >> .internal-link-results/internal-report.md
            echo "" >> .internal-link-results/internal-report.md
            echo "### 🔧 How to Fix" >> .internal-link-results/internal-report.md
            echo "" >> .internal-link-results/internal-report.md
            echo "Internal links in markdown should use the \`relative_url\` filter:" >> .internal-link-results/internal-report.md
            echo '```markdown' >> .internal-link-results/internal-report.md
            echo "Wrong:  [Link Text](/disabilities/hearing/)" >> .internal-link-results/internal-report.md
            echo "Right:  [Link Text]({{ '/disabilities/hearing/' | relative_url }})" >> .internal-link-results/internal-report.md
            echo '```' >> .internal-link-results/internal-report.md
          else
            echo "### ✅ All Internal Links Valid" >> .internal-link-results/internal-report.md
            echo "" >> .internal-link-results/internal-report.md
            echo "All internal links in markdown files are working correctly." >> .internal-link-results/internal-report.md
          fi
      
      - name: Upload internal link check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: internal-link-check-results
          path: .internal-link-results/
          retention-days: 30
  
  check-website-links:
    name: Check Deployed Website Links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check website links with Lychee
        uses: lycheeverse/lychee-action@v2.0.2
        with:
          # Check the deployed GitHub Pages site
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,307,308,429
            --timeout 30
            --max-redirects 10
            --exclude-mail
            --exclude 'linkedin.com'
            --exclude 'twitter.com'
            --exclude 'facebook.com'
            --exclude 'fonts.googleapis.com'
            https://mgifford.github.io/inclusive-emergency-readiness/
          format: markdown
          output: .lychee-results/website-report.md
          jobSummary: true
          fail: false
        # Note: 429 (Too Many Requests) is accepted to avoid false positives when
        # external emergency services are under heavy load. Rate-limiting is common
        # during disasters and shouldn't mark links as broken.
      
      - name: Process website check results
        id: process-website-results
        run: |
          mkdir -p .lychee-results
          
          # Create a marker file for easier downstream checking
          echo "false" > .lychee-results/has_errors.txt
          
          # Check if there were any errors
          # Note: This checks Lychee's markdown output format which uses ✗ for errors
          # If Lychee changes format, update this detection logic
          if [ -f .lychee-results/website-report.md ]; then
            if grep -q "✗" .lychee-results/website-report.md 2>/dev/null; then
              echo "true" > .lychee-results/has_errors.txt
              echo "has_errors=true" >> $GITHUB_OUTPUT
              
              # Add Wayback Machine suggestions
              cat >> .lychee-results/website-report.md << 'EOF'
          
          ---
          
          ## 📦 Wayback Machine Archive
          
          For any broken external links, consider using the Internet Archive's Wayback Machine:
          
          **Steps:**
          1. Take the broken URL
          2. Visit: `https://web.archive.org/web/BROKEN_URL_HERE`
          3. Find the most recent snapshot
          4. Replace the original link with the archived version
          
          **Example:**
          - Original: `https://example.com/page`
          - Archived: `https://web.archive.org/web/20231201000000/https://example.com/page`
          
          EOF
            else
              echo "has_errors=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
      
      - name: Upload website check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-link-check-results
          path: .lychee-results/
          retention-days: 30
  
  create-issue:
    name: Create or Update Issue
    needs: [check-markdown-links, check-internal-links, check-website-links]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
    
    steps:
      - name: Download markdown results
        uses: actions/download-artifact@v4
        with:
          name: markdown-link-check-results
          path: .link-check-results/
        continue-on-error: true
      
      - name: Download internal link results
        uses: actions/download-artifact@v4
        with:
          name: internal-link-check-results
          path: .internal-link-results/
        continue-on-error: true
      
      - name: Download website results
        uses: actions/download-artifact@v4
        with:
          name: website-link-check-results
          path: .lychee-results/
        continue-on-error: true
      
      - name: Create combined issue report
        id: create-combined-report
        run: |
          cat > combined-report.md << 'EOF'
          # 🔗 Link Rot Guard Report
          
          ## Overview
          
          This report checks for broken links in three places:
          1. **External links in markdown source files** - HTTP/HTTPS URLs in the repository
          2. **Internal links in markdown source files** - Links between pages
          3. **Deployed website** - All links on https://mgifford.github.io/inclusive-emergency-readiness/
          
          ---
          
          EOF
          
          has_issues=false
          
          # Add markdown external link results
          if [ -f .link-check-results/markdown-report.md ]; then
            cat .link-check-results/markdown-report.md >> combined-report.md
            has_issues=true
          else
            echo "## ✅ External Links in Markdown Source Files" >> combined-report.md
            echo "" >> combined-report.md
            echo "All external links in markdown source files are working correctly." >> combined-report.md
            echo "" >> combined-report.md
          fi
          
          echo "---" >> combined-report.md
          echo "" >> combined-report.md
          
          # Add internal link results
          if [ -f .internal-link-results/internal-report.md ]; then
            cat .internal-link-results/internal-report.md >> combined-report.md
            
            # Check if there were broken internal links
            if [ -f .internal-link-results/broken-internal-links.txt ]; then
              has_issues=true
            fi
          else
            echo "## ✅ Internal Links in Markdown Source Files" >> combined-report.md
            echo "" >> combined-report.md
            echo "All internal links in markdown source files are working correctly." >> combined-report.md
            echo "" >> combined-report.md
          fi
          
          echo "---" >> combined-report.md
          echo "" >> combined-report.md
          
          # Add website results
          if [ -f .lychee-results/website-report.md ]; then
            echo "## 🌐 Deployed Website" >> combined-report.md
            echo "" >> combined-report.md
            cat .lychee-results/website-report.md >> combined-report.md
            
            # Check the error marker file created by process-website-results step
            if [ -f .lychee-results/has_errors.txt ] && grep -q "true" .lychee-results/has_errors.txt; then
              has_issues=true
            fi
          else
            echo "## ✅ Deployed Website" >> combined-report.md
            echo "" >> combined-report.md
            echo "All links on the deployed website are working correctly." >> combined-report.md
            echo "" >> combined-report.md
          fi
          
          if [ "$has_issues" = true ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create or update issue for broken links
        if: steps.create-combined-report.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('combined-report.md', 'utf8');
            
            // Check if an open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-rot'
            });
            
            const title = '🔗 Link Rot Detected';
            const body = `${report}\n\n---\n*Automated check performed on ${new Date().toUTCString()}*\n*This issue was automatically created by the Link Rot Guard workflow.*`;
            
            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body
              });
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `## 🔄 Link Check Update\n\n**Date:** ${new Date().toUTCString()}\n\nThe link checker has run again. The issue description has been updated with the latest results.`
              });
              
              console.log(`Updated existing issue #${issues.data[0].number}`);
            } else {
              // Create new issue
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['link-rot', 'maintenance']
              });
              
              console.log(`Created new issue #${newIssue.data.number}`);
            }
      
      - name: Summary
        if: always()
        run: |
          if [ -f combined-report.md ]; then
            # Check for errors using the same markers as earlier steps
            if grep -q "FAILED:" combined-report.md 2>/dev/null || \
               ([ -f .lychee-results/has_errors.txt ] && grep -q "true" .lychee-results/has_errors.txt 2>/dev/null); then
              echo "❌ Broken links detected!"
              echo "📋 Issue created/updated with details"
              echo ""
              echo "Please review the artifact for complete details."
            else
              echo "✅ All links are working!"
              echo "🎉 Both markdown sources and deployed website have valid links."
            fi
          else
            echo "⚠️  Could not generate combined report"
          fi
