<header class="site-header" role="banner">
  <div class="container">
    <div class="site-branding">
      <h1 class="site-title">
        <a href="/" rel="home">{{ site.title }}</a>
      </h1>
      <p class="site-description">{{ site.description }}</p>
    </div>
    
    {% include navigation.html %}
    
    <div class="accessibility-controls no-print">
      <button id="high-contrast-toggle" aria-label="Toggle high contrast mode" title="High Contrast Mode">
        🎨 Contrast
      </button>
      <button id="low-data-toggle" aria-label="Toggle low data mode" title="Low Data Mode">
        📊 Low Data
      </button>
      <button id="text-size-increase" aria-label="Increase text size" title="Increase Text Size">
        A+
      </button>
      <button id="text-size-decrease" aria-label="Decrease text size" title="Decrease Text Size">
        A-
      </button>
    </div>
  </div>
</header>

<style>
  .site-branding {
    margin-bottom: 1rem;
  }
  
  .site-description {
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.9);
    margin-top: 0.5rem;
  }
  
  .accessibility-controls {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  
  .accessibility-controls button {
    background-color: rgba(255, 255, 255, 0.2);
    color: white;
    border: 2px solid white;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
  }
  
  .accessibility-controls button:hover,
  .accessibility-controls button:focus {
    background-color: rgba(255, 255, 255, 0.3);
  }
  
  .accessibility-controls button:focus {
    outline: 3px solid white;
    outline-offset: 2px;
  }
  
  .accessibility-controls button.active {
    background-color: white;
    color: #0066cc;
  }
</style>
