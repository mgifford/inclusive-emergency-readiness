<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <meta name="description" content="{% if page.summary %}{{ page.summary | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author.name }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
  
  <!-- Accessibility -->
  <meta name="color-scheme" content="light dark">
  
  <!-- PWA -->
  <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
  <meta name="theme-color" content="#0066cc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Resilience Comms">
  <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
  
  <!-- Open Graph (LinkedIn, Bluesky, Mastodon, Facebook) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta property="og:description" content="{% if page.summary %}{{ page.summary | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image" content="{{ '/assets/images/social-card.png' | absolute_url }}">
  <meta property="og:image:alt" content="Inclusive Emergency Readiness - Accessible emergency exit symbol with person using mobility aid">
  <meta property="og:image:width" content="785">
  <meta property="og:image:height" content="373">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="en_US">

  <!-- JSON-LD Structured Data (Google SEO) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "url": {{ site.url | append: site.baseurl | jsonify }},
    "description": {{ site.description | jsonify }},
    "publisher": {
      "@type": "Organization",
      "name": {{ site.author.name | default: site.title | jsonify }}
    }{% if page.title and page.title != "Home" %},
    "mainEntity": {
      "@type": "WebPage",
      "name": {{ page.title | jsonify }},
      "url": {{ page.url | absolute_url | jsonify }},
      "description": {{ page.summary | default: site.description | strip_html | strip_newlines | truncate: 160 | jsonify }}
    }{% endif %}
  }
  </script>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/emergency.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/print.css' | relative_url }}" media="print">
  
  <!-- SEO -->
  {% seo %}
  
  <!-- Feed -->
  {% feed_meta %}
</head>
<body class="{% if page.high_contrast %}high-contrast{% endif %} {% if page.low_data %}low-data{% endif %}" data-print-date="{{ 'now' | date: '%Y-%m-%d' }}">
  
  <!-- Skip Link for Keyboard Navigation -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <!-- Header -->
  {% include header.html %}
  
  <!-- Main Content -->
  <main id="main-content" role="main" aria-label="Main content">
    <div class="container">
      {{ content }}
    </div>
  </main>
  
  <!-- Footer -->
  {% include footer.html %}
  
  <!-- Accessibility Features Toggle -->
  <script src="{{ '/assets/js/mode-toggle.js' | relative_url }}" defer></script>
  
  <!-- Service Worker Registration (skipped when prefers-reduced-data is set) -->
  <script>
    if ('serviceWorker' in navigator) {
      var skipSW = window.matchMedia && window.matchMedia('(prefers-reduced-data: reduce)').matches;
      if (!skipSW) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('{{ '/assets/js/service-worker.js' | relative_url }}')
            .then(function(registration) {
              console.log('Service Worker registered:', registration);
            })
            .catch(function(error) {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    }
  </script>
  
  <!-- Page weight indicator: shows total transfer size after load -->
  <script>
    window.addEventListener('load', function() {
      // Skip in reduced-data mode to avoid unnecessary JS execution
      if (window.matchMedia && window.matchMedia('(prefers-reduced-data: reduce)').matches) return;
      if (!window.performance || !window.performance.getEntriesByType) return;
      var entries = window.performance.getEntriesByType('resource');
      var totalBytes = 0;
      entries.forEach(function(e) {
        if (e.transferSize) totalBytes += e.transferSize;
      });
      // Also count the navigation entry (the HTML document itself)
      var navEntries = window.performance.getEntriesByType('navigation');
      if (navEntries.length && navEntries[0].transferSize) {
        totalBytes += navEntries[0].transferSize;
      }
      if (totalBytes > 0) {
        var kb = (totalBytes / 1024).toFixed(1);
        var indicator = document.createElement('div');
        indicator.id = 'page-weight-indicator';
        indicator.className = 'page-weight-indicator';
        indicator.setAttribute('aria-hidden', 'true');
        indicator.textContent = kb + ' KB';
        document.body.appendChild(indicator);
      }
    });
  </script>
  
</body>
</html>
